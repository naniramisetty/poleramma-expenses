
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sri Poleramma Jathara</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5e6c8;
    margin:0;
    padding:0;
}

/* MAIN BOX */

.login-box,.app{
    width:90%;
    max-width:700px;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* LOGO */

.logo-box{
    text-align:center;
    margin-bottom:20px;
}

.logo-box img{
    width:130px;
    height:130px;
    border-radius:50%;
    border:5px solid #b30000;
    object-fit:cover;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.logo-box h1{
    margin-top:15px;
    color:#b30000;
    font-size:38px;
}

/* INPUTS */

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:16px;
    box-sizing:border-box;
}

/* BUTTONS */

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#b30000;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#800000;
}

/* TABLE */

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

table th, table td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

table th{
    background:#b30000;
    color:white;
}

/* TOTAL */

.total{
    margin-top:20px;
    font-size:24px;
    text-align:center;
    color:green;
    font-weight:bold;
}

/* HIDDEN */

.hidden{
    display:none;
}

/* BACK BUTTON */

.back-btn{
    background:#444;
}

.back-btn:hover{
    background:#222;
}

</style>

</head>

<body>

<!-- LOGIN PAGE -->

<div class="login-box" id="loginPage">

<div class="logo-box">

<img src="poleramma.png" alt="Sri Poleramma">

<h1>Sri Poleramma Jathara</h1>

</div>

<input type="text"
id="username"
placeholder="Enter Username">

<input type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">
Login
</button>

</div>

<!-- MAIN APP -->

<div class="app">

<div class="logo-box">

<img src="poleramma.png" alt="Sri Poleramma">

<h1>Sri Poleramma Jathara</h1>

</div>

<!-- ADD EXPENSE AREA -->

<div id="expenseAdder" class="hidden">

<input type="text"
id="personName"
placeholder="Person Name">

<input type="number"
id="amount"
placeholder="Amount">

<input type="text"
id="purpose"
placeholder="Purpose">

<button onclick="addExpense()">
Add Expense
</button>

<button class="back-btn"
onclick="logout()">
Back / Logout
</button>

</div>

<!-- EXPENSE TABLE -->

<table>

<thead>

<tr>
<th>Name</th>
<th>Amount</th>
<th>Purpose</th>
<th>Total</th>
</tr>

</thead>

<tbody id="expenseTable">

</tbody>

</table>

<!-- GRAND TOTAL -->

<div class="total"
id="totalAmount">

Grand Total: ₹0

</div>

</div>

<script>

// TOTAL VARIABLE

let total = 0;


// LOGIN FUNCTION

function login(){

    let username =
    document.getElementById("username")
    .value.trim();

    let password =
    document.getElementById("password")
    .value.trim();

    if(username === "Surya" &&
       password === "12345678"){

        document.getElementById("loginPage")
        .style.display = "none";

        document.getElementById("expenseAdder")
        .classList.remove("hidden");

    }else{

        alert("Invalid Username or Password");

    }
}


// LOGOUT FUNCTION

function logout(){

    document.getElementById("loginPage")
    .style.display = "block";

    document.getElementById("expenseAdder")
    .classList.add("hidden");

    document.getElementById("username").value = "";

    document.getElementById("password").value = "";

}


// ADD EXPENSE FUNCTION

function addExpense(){

    let name =
    document.getElementById("personName")
    .value;

    let amount =
    parseInt(
    document.getElementById("amount")
    .value);

    let purpose =
    document.getElementById("purpose")
    .value;

    if(name === "" ||
       isNaN(amount) ||
       purpose === ""){

        alert("Please fill all fields");

        return;
    }

    total += amount;

    let table =
    document.getElementById("expenseTable");

    let row =
    table.insertRow();

    row.insertCell(0).innerHTML = name;

    row.insertCell(1).innerHTML =
    "₹" + amount;

    row.insertCell(2).innerHTML =
    purpose;

    row.insertCell(3).innerHTML =
    "₹" + total;

    document.getElementById("totalAmount")
    .innerHTML =
    "Grand Total: ₹" + total;

    // CLEAR INPUTS

    document.getElementById("personName")
    .value = "";

    document.getElementById("amount")
    .value = "";

    document.getElementById("purpose")
    .value = "";
}

</script>

</body>
</html>
